files:
  - name: config.py
    generation_order: 1
    dependencies: []
    purpose: Hyperparameter configuration for aether property derivation experiments
    classes:
      - name: AetherConfig
        fields:
          - lr: 0.001
          - batch_size: 64
          - epochs: 100
          - hidden_dim: 256
          - num_physics_params: 8
          - seeds: [42, 123, 456, 789, 1024]
          - max_hours: 4
          - device: auto
          - weight_decay: 1e-5
          - aether_constraint_weight: 0.1
          - viscosity_reg: 0.01
          - permittivity_reg: 0.01
          - density_prior: 1e-6
          - elasticity_prior: 1e11
        methods:
          - name: __init__
            pseudocode: |
              1. Set all hyperparameters as attributes
              2. self.device = 'cuda' if torch.cuda.is_available() else 'cpu'
              3. self.param_bounds = {
                   'density': (1e-12, 1e-3),
                   'elasticity': (1e8, 1e15),
                   'viscosity': (0, 1e6),
                   'permittivity': (8e-12, 9e-12)
                 }
              4. Validate parameter bounds consistency
          - name: get_param_init
            pseudocode: |
              1. Return torch tensor of shape [num_physics_params]
              2. Initialize with physically motivated priors
              3. Apply log transform for scale-invariant optimization

  - name: data.py
    generation_order: 2
    dependencies: [config.py]
    purpose: Physics dataset loading for aether property inference
    classes:
      - name: AetherDataset(Dataset)
        fields:
          - observations: Tensor [N, obs_dim]
          - theoretical_predictions: Tensor [N, pred_dim]
          - measurement_errors: Tensor [N, pred_dim]
          - condition_type: str
        methods:
          - name: __init__
            signature: (self, config, condition_type, split='train')
            pseudocode: |
              1. self.condition_type = condition_type
              2. Load observation data from physics_constants
              3. observations = load_em_wave_data()  # [N, 6] wavelength, frequency, amplitude, phase, polarization, intensity
              4. theoretical_predictions = compute_theoretical_baseline(condition_type)
              5. measurement_errors = load_experimental_uncertainties()
              6. Split data: train=0.7, val=0.15, test=0.15
              7. Apply log scaling to large-magnitude values
              8. Normalize observations: obs = (obs - mean) / std
          - name: __len__
            pseudocode: return len(self.observations)
          - name: __getitem__
            signature: (self, idx) -> dict
            pseudocode: |
              1. obs = self.observations[idx]  # [obs_dim]
              2. pred = self.theoretical_predictions[idx]  # [pred_dim]
              3. err = self.measurement_errors[idx]  # [pred_dim]
              4. return {'obs': obs, 'target': pred, 'error': err}
    functions:
      - name: get_dataloaders
        signature: (config, condition_type) -> (train_loader, val_loader, test_loader)
        pseudocode: |
          1. train_dataset = AetherDataset(config, condition_type, 'train')
          2. val_dataset = AetherDataset(config, condition_type, 'val')
          3. test_dataset = AetherDataset(config, condition_type, 'test')
          4. train_loader = DataLoader(train_dataset, batch_size=config.batch_size, shuffle=True)
          5. val_loader = DataLoader(val_dataset, batch_size=config.batch_size, shuffle=False)
          6. test_loader = DataLoader(test_dataset, batch_size=config.batch_size, shuffle=False)
          7. return train_loader, val_loader, test_loader
      - name: generate_synthetic_observations
        signature: (n_samples, aether_params) -> Tensor [N, obs_dim]
        pseudocode: |
          1. Generate EM wave propagation data
          2. Apply Lorentz transformation for ether frame
          3. Add Gaussian noise with experimental uncertainties
          4. Return tensor of shape [n_samples, 6]

  - name: models.py
    generation_order: 3
    dependencies: [config.py]
    purpose: Model architectures for aether property derivation
    classes:
      - name: BaseAetherModel(nn.Module)
        input_shape: [B, 6]
        output_shape: [B, 4]
        fields:
          - physics_encoder: nn.Sequential
          - property_head: nn.Sequential
          - raw_params: nn.Parameter [8]
        methods:
          - name: __init__
            signature: (self, config)
            pseudocode: |
              1. super().__init__()
              2. self.raw_params = nn.Parameter(torch.zeros(config.num_physics_params))
              3. Initialize raw_params with config.get_param_init()
              4. self.physics_encoder = nn.Sequential(
                   nn.Linear(6, config.hidden_dim),
                   nn.ReLU(),
                   nn.Linear(config.hidden_dim, config.hidden_dim),
                   nn.ReLU(),
                   nn.Linear(config.hidden_dim, 128)
                 )
              5. self.property_head = nn.Sequential(
                   nn.Linear(128 + config.num_physics_params, 64),
                   nn.ReLU(),
                   nn.Linear(64, 4)
                 )
          - name: forward
            signature: (self, obs) -> Tensor [B, 4]
            pseudocode: |
              1. encoded = self.physics_encoder(obs)  # [B, 128]
              2. params_expanded = self.raw_params.expand(obs.shape[0], -1)  # [B, 8]
              3. combined = torch.cat([encoded, params_expanded], dim=1)  # [B, 136]
              4. properties = self.property_head(combined)  # [B, 4]
              5. properties = self.apply_physical_constraints(properties)
              6. return properties  # [density, elasticity, viscosity, permittivity]
          - name: apply_physical_constraints
            signature: (self, props) -> Tensor [B, 4]
            pseudocode: |
              1. density = F.softplus(props[:, 0:1])  # Ensure positive
              2. elasticity = F.softplus(props[:, 1:2])  # Ensure positive
              3. viscosity = F.softplus(props[:, 2:3])  # Ensure positive
              4. permittivity = 8.854e-12 + torch.tanh(props[:, 3:4]) * 1e-13
              5. return torch.cat([density, elasticity, viscosity, permittivity], dim=1)
          - name: compute_physics_loss
            signature: (self, predictions, targets, errors) -> Tensor []
            pseudocode: |
              1. chi_squared = ((predictions - targets) ** 2 / (errors ** 2 + 1e-8)).mean()
              2. return chi_squared

      - name: LorentzEtherModel(BaseAetherModel)
        differentiator: Full Lorentz ether theory with complete physical properties
        overrides: [forward, compute_physics_loss]
        methods:
          - name: forward
            signature: (self, obs) -> Tensor [B, 4]
            pseudocode: |
              1. encoded = self.physics_encoder(obs)  # [B, 128]
              2. lorentz_factor = self.compute_lorentz_factor(encoded)  # [B, 1]
              3. params_expanded = self.raw_params.expand(obs.shape[0], -1)
              4. params_corrected = params_expanded * lorentz_factor  # Apply Lorentz contraction
              5. combined = torch.cat([encoded, params_corrected], dim=1)
              6. properties = self.property_head(combined)
              7. properties = self.apply_lorentz_constraints(properties, lorentz_factor)
              8. return properties
          - name: compute_lorentz_factor
            signature: (self, encoded) -> Tensor [B, 1]
            pseudocode: |
              1. velocity_embedding = encoded[:, :32]  # [B, 32]
              2. v_squared = torch.sigmoid(velocity_embedding.mean(dim=1, keepdim=True))
              3. gamma = 1.0 / torch.sqrt(1.0 - v_squared + 1e-8)  # [B, 1]
              4. return gamma
          - name: apply_lorentz_constraints
            signature: (self, props, gamma) -> Tensor [B, 4]
            pseudocode: |
              1. density = F.softplus(props[:, 0:1]) * gamma  # Density increases with motion
              2. elasticity = F.softplus(props[:, 1:2]) / gamma  # Elasticity transforms
              3. viscosity = F.softplus(props[:, 2:3])  # Viscosity frame-independent
              4. permittivity = 8.854e-12 + torch.tanh(props[:, 3:4]) * 1e-13
              5. return torch.cat([density, elasticity, viscosity, permittivity], dim=1)
          - name: compute_physics_loss
            signature: (self, predictions, targets, errors) -> Tensor []
            pseudocode: |
              1. chi_squared = ((predictions - targets) ** 2 / (errors ** 2 + 1e-8)).mean()
              2. lorentz_reg = self.compute_lorentz_consistency_loss()
              3. return chi_squared + 0.1 * lorentz_reg

      - name: DiracAetherModel(BaseAetherModel)
        differentiator: Dirac 1951 aether model with quantum vacuum properties
        overrides: [forward, compute_physics_loss]
        methods:
          - name: __init__
            signature: (self, config)
            pseudocode: |
              1. super().__init__(config)
              2. self.quantum_encoder = nn.Sequential(
                   nn.Linear(6, 64),
                   nn.Tanh(),
                   nn.Linear(64, 32)
                 )
              3. self.vacuum_coupling = nn.Parameter(torch.tensor(0.5))
          - name: forward
            signature: (self, obs) -> Tensor [B, 4]
            pseudocode: |
              1. classical_encoded = self.physics_encoder(obs)  # [B, 128]
              2. quantum_features = self.quantum_encoder(obs)  # [B, 32]
              3. vacuum_factor = torch.sigmoid(self.vacuum_coupling)
              4. combined_features = classical_encoded * (1 - vacuum_factor) + quantum_features * vacuum_factor
              5. params_expanded = self.raw_params.expand(obs.shape[0], -1)
              6. full_combined = torch.cat([combined_features, params_expanded], dim=1)
              7. properties = self.property_head(full_combined)
              8. properties = self.apply_dirac_quantization(properties)
              9. return properties
          - name: apply_dirac_quantization
            signature: (self, props) -> Tensor [B, 4]
            pseudocode: |
              1. h_bar = 1.054571817e-34
              2. density = F.softplus(props[:, 0:1]) * h_bar  # Quantized density
              3. elasticity = F.softplus(props[:, 1:2])
              4. viscosity = F.softplus(props[:, 2:3]) * h_bar  # Quantized viscosity
              5. permittivity = 8.854e-12 * (1 + torch.tanh(props[:, 3:4]) * 0.01)
              6. return torch.cat([density, elasticity, viscosity, permittivity], dim=1)
          - name: compute_physics_loss
            signature: (self, predictions, targets, errors) -> Tensor []
            pseudocode: |
              1. chi_squared = ((predictions - targets) ** 2 / (errors ** 2 + 1e-8)).mean()
              2. quantization_reg = torch.abs(self.vacuum_coupling - 0.5)
              3. return chi_squared + 0.05 * quantization_reg

      - name: MaxwellBaseline(BaseAetherModel)
        differentiator: Standard Maxwell equations without aether medium
        overrides: [forward, compute_physics_loss]
        methods:
          - name: __init__
            signature: (self, config)
            pseudocode: |
              1. super().__init__(config)
              2. self.maxwell_encoder = nn.Sequential(
                   nn.Linear(6, config.hidden_dim),
                   nn.ReLU(),
                   nn.Dropout(0.1),
                   nn.Linear(config.hidden_dim, 128)
                 )
              3. Freeze aether parameters to near-zero
              4. with torch.no_grad(): self.raw_params.fill_(1e-10)
          - name: forward
            signature: (self, obs) -> Tensor [B, 4]
            pseudocode: |
              1. encoded = self.maxwell_encoder(obs)  # [B, 128]
              2. params_expanded = self.raw_params.expand(obs.shape[0], -1)
              3. combined = torch.cat([encoded, params_expanded], dim=1)
              4. properties = self.property_head(combined)
              5. properties = self.apply_maxwell_constraints(properties)
              6. return properties
          - name: apply_maxwell_constraints
            signature: (self, props) -> Tensor [B, 4]
            pseudocode: |
              1. density = torch.zeros_like(props[:, 0:1])  # No aether density
              2. elasticity = torch.zeros_like(props[:, 1:2])  # No aether elasticity
              3. viscosity = torch.zeros_like(props[:, 2:3])  # No aether viscosity
              4. permittivity = 8.854e-12 + torch.tanh(props[:, 3:4]) * 1e-13
              5. return torch.cat([density, elasticity, viscosity, permittivity], dim=1)
          - name: compute_physics_loss
            signature: (self, predictions, targets, errors) -> Tensor []
            pseudocode: |
              1. permittivity_pred = predictions[:, 3:4]
              2. permittivity_target = targets[:, 3:4]
              3. permittivity_error = errors[:, 3:4]
              4. chi_squared = ((permittivity_pred - permittivity_target) ** 2 / (permittivity_error ** 2 + 1e-8)).mean()
              5. return chi_squared

      - name: SuperfluidVacuumModel(BaseAetherModel)
        differentiator: Superfluid vacuum theory with viscosity-free aether
        overrides: [forward, compute_physics_loss]
        methods:
          - name: __init__
            signature: (self, config)
            pseudocode: |
              1. super().__init__(config)
              2. self.superfluid_encoder = nn.Sequential(
                   nn.Linear(6, config.hidden_dim),
                   nn.GELU(),
                   nn.Linear(config.hidden_dim, 128)
                 )
              3. self.critical_velocity = nn.Parameter(torch.tensor(1e-6))
          - name: forward
            signature: (self, obs) -> Tensor [B, 4]
            pseudocode: |
              1. encoded = self.superfluid_encoder(obs)  # [B, 128]
              2. params_expanded = self.raw_params.expand(obs.shape[0], -1)
              3. combined = torch.cat([encoded, params_expanded], dim=1)
              4. properties = self.property_head(combined)
              5. properties = self.apply_superfluid_constraints(properties, obs)
              6. return properties
          - name: apply_superfluid_constraints
            signature: (self, props, obs) -> Tensor [B, 4]
            pseudocode: |
              1. density = F.softplus(props[:, 0:1])
              2. elasticity = F.softplus(props[:, 1:2])
              3. viscosity = torch.zeros_like(props[:, 2:3])  # Zero viscosity - superfluid!
              4. permittivity = 8.854e-12 + torch.tanh(props[:, 3:4]) * 1e-13
              5. return torch.cat([density, elasticity, viscosity, permittivity], dim=1)
          - name: compute_physics_loss
            signature: (self, predictions, targets, errors) -> Tensor []
            pseudocode: |
              1. chi_squared = ((predictions - targets) ** 2 / (errors ** 2 + 1e-8)).mean()
              2. superfluid_reg = torch.abs(predictions[:, 2]).mean()  # Penalize any viscosity
              3. return chi_squared + 0.1 * superfluid_reg

      - name: LinearizedAetherModel(BaseAetherModel)
        differentiator: Simplified linear model for ablation study
        overrides: [forward, compute_physics_loss]
        methods:
          - name: __init__
            signature: (self, config)
            pseudocode: |
              1. super().__init__(config)
              2. Replace physics_encoder with simple linear layer
              3. self.physics_encoder = nn.Linear(6, 128)
          - name: forward
            signature: (self, obs) -> Tensor [B, 4]
            pseudocode: |
              1. encoded = self.physics_encoder(obs)  # [B, 128] - no nonlinearity
              2. params_expanded = self.raw_params.expand(obs.shape[0], -1)
              3. combined = torch.cat([encoded, params_expanded], dim=1)
              4. properties = self.property_head(combined)
              5. properties = self.apply_physical_constraints(properties)
              6. return properties
          - name: compute_physics_loss
            signature: (self, predictions, targets, errors) -> Tensor []
            pseudocode: |
              1. chi_squared = ((predictions - targets) ** 2 / (errors ** 2 + 1e-8)).mean()
              2. return chi_squared  # No additional regularization

      - name: NoViscosityAetherModel(BaseAetherModel)
        differentiator: Aether model without viscosity component (ablation)
        overrides: [forward, compute_physics_loss]
        methods:
          - name: forward
            signature: (self, obs) -> Tensor [B, 4]
            pseudocode: |
              1. encoded = self.physics_encoder(obs)  # [B, 128]
              2. params_reduced = self.raw_params[:6]  # Exclude viscosity-related params
              3. params_expanded = params_reduced.expand(obs.shape[0], -1)
              4. Pad params to match expected dimension
              5. combined = torch.cat([encoded, params_expanded, torch.zeros(obs.shape[0], 2)], dim=1)
              6. properties = self.property_head(combined)
              7. properties = self.apply_no_viscosity_constraints(properties)
              8. return properties
          - name: apply_no_viscosity_constraints
            signature: (self, props) -> Tensor [B, 4]
            pseudocode: |
              1. density = F.softplus(props[:, 0:1])
              2. elasticity = F.softplus(props[:, 1:2])
              3. viscosity = torch.zeros_like(props[:, 2:3])  # Ablated: no viscosity
              4. permittivity = 8.854e-12 + torch.tanh(props[:, 3:4]) * 1e-13
              5. return torch.cat([density, elasticity, viscosity, permittivity], dim=1)
          - name: compute_physics_loss
            signature: (self, predictions, targets, errors) -> Tensor []
            pseudocode: |
              1. chi_squared = ((predictions - targets) ** 2 / (errors ** 2 + 1e-8)).mean()
              2. return chi_squared

  - name: training.py
    generation_order: 4
    dependencies: [config.py, data.py, models.py]
    purpose: Training loop and evaluation with physics-aware metrics
    classes:
      - name: Trainer
        fields:
          - model: nn.Module
          - config: AetherConfig
          - optimizer: torch.optim.Optimizer
          - scheduler: torch.optim.lr_scheduler
          - device: str
        methods:
          - name: __init__
            signature: (self, model, config)
            pseudocode: |
              1. self.model = model.to(config.device)
              2. self.config = config
              3. self.device = config.device
              4. self.optimizer = torch.optim.AdamW(
                   model.parameters(),
                   lr=config.lr,
                   weight_decay=config.weight_decay
                 )
              5. self.scheduler = torch.optim.lr_scheduler.ReduceLROnPlateau(
                   self.optimizer, mode='min', factor=0.5, patience=10
                 )
              6. self.history = {'train_loss': [], 'val_loss': [], 'val_metric': []}
          - name: train_one_epoch
            signature: (self, train_loader) -> float
            pseudocode: |
              1. self.model.train()
              2. total_loss = 0.0
              3. num_batches = 0
              4. for batch in train_loader:
                   obs = batch['obs'].to(self.device)  # [B, 6]
                   target = batch['target'].to(self.device)  # [B, 4]
                   error = batch['error'].to(self.device)  # [B, 4]
                   
                   self.optimizer.zero_grad()
                   predictions = self.model(obs)  # [B, 4]
                   loss = self.model.compute_physics_loss(predictions, target, error)
                   loss.backward()
                   torch.nn.utils.clip_grad_norm_(self.model.parameters(), max_norm=1.0)
                   self.optimizer.step()
                   
                   total_loss += loss.item()
                   num_batches += 1
              5. avg_loss = total_loss / max(num_batches, 1)
              6. self.history['train_loss'].append(avg_loss)
              7. return avg_loss
          - name: evaluate
            signature: (self, val_loader) -> dict
            pseudocode: |
              1. self.model.eval()
              2. total_loss = 0.0
              3. all_predictions = []
              4. all_targets = []
              5. with torch.no_grad():
                   for batch in val_loader:
                     obs = batch['obs'].to(self.device)
                     target = batch['target'].to(self.device)
                     error = batch['error'].to(self.device)
                     
                     predictions = self.model(obs)
                     loss = self.model.compute_physics_loss(predictions, target, error)
                     
                     total_loss += loss.item()
                     all_predictions.append(predictions.cpu().detach())
                     all_targets.append(target.cpu().detach())
              6. avg_loss = total_loss / len(val_loader)
              7. all_predictions = torch.cat(all_predictions, dim=0)  # [N, 4]
              8. all_targets = torch.cat(all_targets, dim=0)  # [N, 4]
              9. primary_metric = self.compute_primary_metric(all_predictions, all_targets)
              10. secondary_metric = self.compute_secondary_metric(all_predictions, all_targets)
              11. self.history['val_loss'].append(avg_loss)
              12. self.history['val_metric'].append(primary_metric)
              13. return {'loss': avg_loss, 'primary_metric': primary_metric, 'secondary_metric': secondary_metric}
          - name: compute_primary_metric
            signature: (self, predictions, targets) -> float
            pseudocode: |
              1. predictions_np = predictions.numpy()  # [N, 4]
              2. targets_np = targets.numpy()  # [N, 4]
              3. Compute chi-squared goodness of fit
              4. residuals = predictions_np - targets_np
              5. chi_sq = np.sum(residuals ** 2, axis=0)  # [4]
              6. reduced_chi_sq = chi_sq / (len(predictions_np) - 4)
              7. primary_metric = 1.0 / (1.0 + np.mean(reduced_chi_sq))
              8. return float(primary_metric)
          - name: compute_secondary_metric
            signature: (self, predictions, targets) -> float
            pseudocode: |
              1. predictions_np = predictions.numpy()
              2. targets_np = targets.numpy()
              3. Compute R-squared for each property
              4. ss_res = np.sum((targets_np - predictions_np) ** 2, axis=0)
              5. ss_tot = np.sum((targets_np - targets_np.mean(axis=0)) ** 2, axis=0)
              6. r_squared = 1 - ss_res / (ss_tot + 1e-8)
              7. return float(np.mean(r_squared))
          - name: fit
            signature: (self, train_loader, val_loader) -> dict
            pseudocode: |
              1. best_val_loss = float('inf')
              2. patience_counter = 0
              3. for epoch in range(self.config.epochs):
                   train_loss = self.train_one_epoch(train_loader)
                   val_metrics = self.evaluate(val_loader)
                   
                   self.scheduler.step(val_metrics['loss'])
                   
                   if val_metrics['loss'] < best_val_loss:
                     best_val_loss = val_metrics['loss']
                     patience_counter = 0
                     best_model_state = self.model.state_dict().copy()
                   else:
                     patience_counter += 1
                   
                   if patience_counter >= 20:
                     break
              4. self.model.load_state_dict(best_model_state)
              5. return {'final_train_loss': train_loss, 'best_val_loss': best_val_loss}

    functions:
      - name: run_experiment
        signature: (model_class, config, seed) -> dict
        pseudocode: |
          1. Set random seeds: torch.manual_seed(seed), np.random.seed(seed)
          2. condition_name = model_class.__name__
          3. train_loader, val_loader, test_loader = get_dataloaders(config, condition_name)
          4. model = model_class(config)
          5. trainer = Trainer(model, config)
          6. fit_results = trainer.fit(train_loader, val_loader)
          7. test_metrics = trainer.evaluate(test_loader)
          8. Return dict with all metrics and derived properties

  - name: main.py
    generation_order: 5
    dependencies: [config.py, data.py, models.py, training.py]
    purpose: Entry point — runs ALL conditions with proper metric reporting
    contract:
      prints_metric_def: true
      prints_registered_conditions: true
      runs_all_conditions: true
      per_seed_reporting: true
      time_budget_guard: true
    constants:
      - METRIC_DEF: "primary_metric = chi-squared goodness of fit (higher is better, range [0,1])"
      - REGISTERED_CONDITIONS: "[LorentzEtherModel, DiracAetherModel, MaxwellBaseline, SuperfluidVacuumModel, LinearizedAetherModel, NoViscosityAetherModel]"
    functions:
      - name: main
        pseudocode: |
          1. print("METRIC_DEF: primary_metric = chi-squared goodness of fit (higher=better, [0,1])")
          2. print("REGISTERED_CONDITIONS: LorentzEtherModel, DiracAetherModel, MaxwellBaseline, SuperfluidVacuumModel, LinearizedAetherModel, NoViscosityAetherModel")
          3. config = AetherConfig()
          4. start_time = time.time()
          5. time_budget_seconds = config.max_hours * 3600
          
          6. conditions = [
               ('ProposedMethod', LorentzEtherModel),
               ('DiracVariant', DiracAetherModel),
               ('Baseline1_Maxwell', MaxwellBaseline),
               ('Baseline2_Superfluid', SuperfluidVacuumModel),
               ('Ablation_Linearized', LinearizedAetherModel),
               ('Ablation_NoViscosity', NoViscosityAetherModel)
             ]
          
          7. results = {}
          8. for condition_name, model_class in conditions:
               print(f"\n=== Running condition: {condition_name} ===")
               condition_results = []
               
               for seed in config.seeds:
                 elapsed = time.time() - start_time
                 if elapsed > time_budget_seconds * 0.9:
                   print("TIME_BUDGET_WARNING: Approaching limit, skipping remaining seeds")
                   break
                 
                 print(f"  Seed: {seed}")
                 seed_result = run_experiment(model_class, config, seed)
                 condition_results.append(seed_result)
                 print(f"    primary_metric: {seed_result['primary_metric']:.4f}")
                 print(f"    secondary_metric: {seed_result['secondary_metric']:.4f}")
                 print(f"    derived_density: {seed_result['properties']['density']:.2e}")
                 print(f"    derived_elasticity: {seed_result['properties']['elasticity']:.2e}")
                 print(f"    derived_viscosity: {seed_result['properties']['viscosity']:.2e}")
                 print(f"    derived_permittivity: {seed_result['properties']['permittivity']:.2e}")
               
               results[condition_name] = condition_results
               
               primary_values = [r['primary_metric'] for r in condition_results]
               secondary_values = [r['secondary_metric'] for r in condition_results]
               print(f"\n  SUMMARY {condition_name}:")
               print(f"    primary_metric: {np.mean(primary_values):.4f} ± {np.std(primary_values):.4f}")
               print(f"    secondary_metric: {np.mean(secondary_values):.4f} ± {np.std(secondary_values):.4f}")
          
          9. print("\n" + "="*60)
          10. print("FINAL COMPARISON SUMMARY:")
          11. for condition_name, condition_results in results.items():
                primary_values = [r['primary_metric'] for r in condition_results]
                print(f"  {condition_name}: {np.mean(primary_values):.4f} ± {np.std(primary_values):.4f}")
          
          12. elapsed_total = time.time() - start_time
          13. print(f"\nTotal experiment time: {elapsed_total/3600:.2f} hours")
          14. print("Experiment completed successfully.")

